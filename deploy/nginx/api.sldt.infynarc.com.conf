# nginx site config for the Hoteldesk API on the Hostinger VPS.
#
# Place at: /etc/nginx/sites-available/api.sldt.infynarc.com.conf
# Enable:   ln -s ../sites-available/api.sldt.infynarc.com.conf /etc/nginx/sites-enabled/
# Test:     nginx -t
# Reload:   systemctl reload nginx
#
# COEXISTENCE: this VPS already serves other APIs (api.infynarc.com,
# bmsapi.infynarc.com) — nginx routes by `server_name`, so this is just
# one more site file. It does NOT conflict with the others as long as
# the proxy_pass port below matches the Hoteldesk container's host port.
#
# >>> The proxy_pass port MUST equal HOTELDESK_HOST_PORT from
#     deploy/docker-compose.prod.yml. Both default to 3010. If you set a
#     different host port for the container, change it here too. <<<
#
# FIRST-TIME SETUP ORDER (important):
#   1. Install ONLY the HTTP (port 80) server block below — comment out or
#      omit the entire `listen 443 ssl` block. nginx will not pass
#      `nginx -t` with an `ssl` listener that has no ssl_certificate yet.
#   2. `nginx -t && systemctl reload nginx`
#   3. `certbot --nginx -d api.sldt.infynarc.com` — this issues the cert
#      AND writes a complete HTTPS server block (with real ssl_certificate
#      paths) into the live config itself.
# The HTTPS block kept here is a REFERENCE for what certbot produces; on a
# fresh box, let certbot generate it rather than pasting it in by hand.
# See DEPLOY.md step 3g-3h.

# ---- HTTP : redirect everything to HTTPS (also serves ACME challenge) ----
server {
    listen 80;
    listen [::]:80;
    server_name api.sldt.infynarc.com;

    # Let's Encrypt renewal probes hit this path — must stay on plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS : reverse-proxy to the API container on 127.0.0.1:3010 -------
server {
    # http2 goes ON the listen line (works on nginx 1.9.5+). Older nginx
    # rejects the standalone `http2 on;` directive.
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.sldt.infynarc.com;

    # --- TLS (certbot fills these in; placeholders shown) ---
    # ssl_certificate     /etc/letsencrypt/live/api.sldt.infynarc.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.sldt.infynarc.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # PDF downloads (invoices/receipts) can be a few hundred KB; KYC photo
    # uploads go through multer. 15m is comfortably above both.
    client_max_body_size 15m;

    # Don't leak the nginx version in headers.
    server_tokens off;

    # The API already sets HSTS/CSP/etc via helmet, but HSTS at the proxy
    # edge guarantees it even on error responses nginx generates itself.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location / {
        # Must match HOTELDESK_HOST_PORT in deploy/docker-compose.prod.yml.
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;

        # Preserve the real client info — the API does `trust proxy: 1`
        # and uses these for rate-limit keying + audit-log IP addresses.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Connection upgrade headers — harmless for plain HTTP, future-proofs
        # if the API ever adds websockets.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # PDF rendering (Puppeteer) can take a few seconds on a cold path;
        # give it generous read headroom so big invoices don't 504.
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering off;
    }
}
