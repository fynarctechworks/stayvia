# nginx site config for the Hoteldesk WEB app on the Hostinger VPS.
#
# Place at: /etc/nginx/sites-available/sldt.infynarc.com.conf
# Enable:   ln -s ../sites-available/sldt.infynarc.com.conf /etc/nginx/sites-enabled/
# Test:     nginx -t
# Reload:   systemctl reload nginx
#
# This serves the static Vite build (apps/web/dist) as a Single Page
# Application. The CRITICAL line is `try_files $uri $uri/ /index.html;`
# in the `location /` block: it makes nginx fall back to index.html for
# any path that isn't a real file. WITHOUT it, reloading a client-side
# route like /login or /reservations returns 404, because nginx looks
# for a file at that path and there isn't one — the routing lives in
# the React Router bundle, not on disk.
#
# COEXISTENCE: this VPS already serves api.sldt.infynarc.com (and other
# infynarc sites). nginx routes by `server_name`, so this is just one
# more site file. No conflict as long as the server_name is unique.
#
# DEPLOY THE BUILD:
#   On your machine:   npm run build:web        (outputs apps/web/dist)
#   Copy dist to VPS:  rsync -avz --delete apps/web/dist/ \
#                        user@vps:/var/www/sldt.infynarc.com/
#   (or git pull on the VPS + build there, then point root at that dist)
#
# IMPORTANT — the web build bakes VITE_API_URL at build time. Make sure
# apps/web/.env.production has:
#     VITE_API_URL=https://api.sldt.infynarc.com/api/v1
# before you run `npm run build:web`, otherwise the deployed frontend
# will call the wrong API host.
#
# FIRST-TIME SETUP ORDER (same as the API config):
#   1. Install ONLY the HTTP (port 80) server block below — comment out
#      the entire `listen 443 ssl` block. nginx won't pass `nginx -t`
#      with an ssl listener that has no certificate yet.
#   2. nginx -t && systemctl reload nginx
#   3. certbot --nginx -d sldt.infynarc.com  — issues the cert AND
#      rewrites a complete HTTPS server block into the live config.

# ---- HTTP : redirect to HTTPS (also serves ACME challenge) ----
server {
    listen 80;
    listen [::]:80;
    server_name sldt.infynarc.com;

    # Let's Encrypt renewal probes hit this path — keep on plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS : serve the static SPA build ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sldt.infynarc.com;

    # --- TLS (certbot fills these in; placeholders shown) ---
    # ssl_certificate     /etc/letsencrypt/live/sldt.infynarc.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sldt.infynarc.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Path to the built frontend (the contents of apps/web/dist).
    root /var/www/sldt.infynarc.com;
    index index.html;

    # Security headers (mirror the app's helmet config where relevant).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip text assets.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Vite fingerprints asset filenames (e.g. index-a1b2c3.js), so they
    # are safe to cache forever — they change name when content changes.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html must NEVER be cached — it's the entry point that
    # references the fingerprinted assets. Caching it would pin users to
    # a stale bundle after a deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback. THE FIX for the reload-404 bug: any path that isn't a
    # real file falls back to index.html, so React Router can resolve the
    # route client-side. /login, /reservations, /book/PRIMARY, etc. all
    # survive a hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
