server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers. The strict CSP equivalent of what the API sets,
  # adapted for an HTML host: allow same-origin scripts/styles, inline
  # styles (Tailwind injects a few), images from self + data: (favicons,
  # base64 logo blobs), and connect-src wide enough to reach the API
  # and Supabase. Tighten connect-src if you front everything through
  # the same domain.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

  # Hashed assets — immutable, cache forever.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # index.html — never cache, so deploys land on next refresh.
  location = /index.html {
    add_header Cache-Control "no-store, must-revalidate";
    try_files $uri =404;
  }

  # SPA fallback. Any unknown path goes to index.html so React Router can
  # handle it client-side.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
